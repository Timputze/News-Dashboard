name: Run News Ingestion

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-ingestion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install feedparser psycopg[binary] langdetect

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python ingestion.py
